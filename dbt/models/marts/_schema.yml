version: 2

models:
  - name: dim_pokemon
    description: "Pokémon dimension with base stats, typing, and sprites"
    columns:
      - name: pokemon_key
        description: "Surrogate key"
        tests:
          - unique
          - not_null
      - name: pokemon_id
        tests:
          - unique
          - not_null
      - name: pokemon_name
        tests:
          - not_null
      - name: type_1
        tests:
          - not_null
      - name: hp
        tests:
          - not_null
      - name: attack
        tests:
          - not_null
      - name: defense
        tests:
          - not_null
      - name: sp_attack
        tests:
          - not_null
      - name: sp_defense
        tests:
          - not_null
      - name: speed
        tests:
          - not_null
      - name: base_stat_total
        tests:
          - not_null

  - name: dim_moves
    description: "Move dimension with type, power, accuracy, and category"
    columns:
      - name: move_key
        description: "Surrogate key"
        tests:
          - unique
          - not_null
      - name: move_id
        tests:
          - unique
          - not_null
      - name: move_name
        tests:
          - not_null
      - name: move_type
        tests:
          - not_null
      - name: damage_class
        tests:
          - not_null
          - accepted_values:
              values: ["physical", "special", "status"]

  - name: dim_abilities
    description: "Ability dimension"
    columns:
      - name: ability_key
        description: "Surrogate key"
        tests:
          - unique
          - not_null
      - name: ability_id
        tests:
          - unique
          - not_null
      - name: ability_name
        tests:
          - not_null

  - name: dim_tiers
    description: "Tier dimension — one row per unique tier (e.g. gen9ou)"
    columns:
      - name: tier_key
        description: "Surrogate key"
        tests:
          - unique
          - not_null
      - name: tier_id
        tests:
          - unique
          - not_null
      - name: generation
        tests:
          - not_null
      - name: tier_name
        tests:
          - not_null

  - name: dim_months
    description: "Month dimension — one row per month with date parts"
    columns:
      - name: month_key
        description: "Surrogate key"
        tests:
          - unique
          - not_null
      - name: month_id
        tests:
          - unique
          - not_null
      - name: year
        tests:
          - not_null
      - name: month_number
        tests:
          - not_null
      - name: month_start_date
        tests:
          - not_null

  - name: fct_usage
    description: "Usage fact — grain: (pokemon, tier, month)"
    columns:
      - name: usage_key
        description: "Surrogate key"
        tests:
          - unique
          - not_null
      - name: tier_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_tiers')
              field: tier_key
      - name: month_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_months')
              field: month_key
      - name: pokemon_name
        tests:
          - not_null
      - name: usage_pct
        tests:
          - not_null
      - name: rank
        tests:
          - not_null

  - name: fct_moveset
    description: "Moveset fact — grain: (pokemon, move, tier, month)"
    columns:
      - name: moveset_key
        description: "Surrogate key"
        tests:
          - unique
          - not_null
      - name: tier_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_tiers')
              field: tier_key
      - name: month_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_months')
              field: month_key
      - name: pokemon_name
        tests:
          - not_null
      - name: move_name
        tests:
          - not_null
      - name: move_usage_pct
        tests:
          - not_null
